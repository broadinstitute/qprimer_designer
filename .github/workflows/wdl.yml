name: WDL Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Install package
        run: pip install -e .
        shell: micromamba-shell {0}

      - name: Validate WDL syntax
        run: |
          cd workflows
          miniwdl check qprimer.wdl
        shell: micromamba-shell {0}
